<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mapa · Crédito Rural por Município</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root{
      --bg:#f5f2ec; --card:#fff; --ink:#222; --muted:#777; --green:#2d5a3d; --green2:#4a7c5f; --line:#ddd;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial, sans-serif;background:var(--bg);color:var(--ink)}
    header{padding:14px 18px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
    header h1{font-size:18px;margin:0}
    header .hint{font-size:12px;opacity:.8}
    .layout{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 58px)}
    aside{background:#faf8f4;border-right:1px solid var(--line);padding:14px;overflow:auto}
    main{position:relative;min-height:500px}
    #map{height:100%;width:100%}
    .box{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px}
    label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px}
    select,button{width:100%;padding:9px;border:1px solid var(--line);border-radius:7px;background:#fff}
    button{background:var(--green2);color:#fff;border:0;cursor:pointer;font-weight:700;margin-top:8px}
    button.secondary{background:#777}
    button.danger{background:#b34a2a}
    button:disabled{opacity:.55;cursor:not-allowed}
    .stat{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .stat div{background:#f2efe8;border:1px solid #e1ddd2;border-radius:8px;padding:8px}
    .stat b{display:block;font-size:16px;color:var(--green)}
    .stat span{font-size:11px;color:var(--muted)}
    #log{font-family:monospace;font-size:11px;white-space:pre-wrap;background:#111;color:#eee;border-radius:8px;padding:10px;max-height:190px;overflow:auto}
    .progress{height:8px;background:#e2ddd2;border-radius:99px;overflow:hidden;margin:8px 0}
    .bar{height:100%;width:0;background:var(--green2);transition:width .2s}
    table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
    th,td{border-bottom:1px solid #eee;padding:5px;text-align:left}
    th{color:var(--muted);font-size:10px}
    .leaflet-popup-content{font-size:12px;line-height:1.45}
    .legend{position:absolute;right:14px;bottom:18px;background:#fff;padding:10px;border-radius:8px;border:1px solid #ddd;z-index:500;font-size:11px;box-shadow:0 2px 10px rgba(0,0,0,.12)}
    .sw{display:inline-block;width:14px;height:10px;margin-right:5px;border:1px solid rgba(0,0,0,.15)}
    @media(max-width:900px){.layout{grid-template-columns:1fr;height:auto} aside{height:auto} main{height:70vh}}
  </style>
</head>
<body>
<header>
  <h1>🌿 Crédito Rural por Município · BCB/SICOR</h1>
  <div class="hint">Carrega 2015–2025 via /api/bcb, agrega por município e desenha uma UF por vez</div>
</header>

<div class="layout">
  <aside>
    <div class="box">
      <label>Período</label>
      <select id="periodo">
        <option value="2015-2025" selected>2015–2025</option>
        <option value="2023-2025">2023–2025 teste rápido</option>
        <option value="2025-2025">2025 somente</option>
      </select>

      <label>UF para desenhar no mapa</label>
      <select id="uf"></select>

      <label>Métrica do mapa</label>
      <select id="metric">
        <option value="valorTotal" selected>Valor total</option>
        <option value="qtdTotal">Quantidade de contratos</option>
        <option value="vlCusteio">Valor custeio</option>
        <option value="vlInvestimento">Valor investimento</option>
        <option value="vlComercializacao">Valor comercialização</option>
        <option value="vlIndustrializacao">Valor industrialização</option>
      </select>

      <button id="btnLoad" onclick="carregarDados()">1. Carregar dados BCB</button>
      <button id="btnMap" onclick="desenharUF()">2. Desenhar UF selecionada</button>
      <button class="secondary" onclick="baixarCSV()">Baixar agregado CSV</button>
      <button class="danger" onclick="parar()">Parar carregamento</button>
    </div>

    <div class="box">
      <strong>Status</strong>
      <div class="progress"><div id="bar" class="bar"></div></div>
      <div id="status">Pronto.</div>
    </div>

    <div class="box stat">
      <div><b id="sMun">0</b><span>municípios agregados</span></div>
      <div><b id="sReg">0</b><span>linhas BCB lidas</span></div>
      <div><b id="sVal">R$ 0</b><span>valor total</span></div>
      <div><b id="sQtd">0</b><span>contratos</span></div>
    </div>

    <div class="box">
      <strong>Top municípios da UF</strong>
      <div id="topTable">Carregue os dados e desenhe uma UF.</div>
    </div>

    <div class="box">
      <strong>Log</strong>
      <div id="log"></div>
    </div>
  </aside>

  <main>
    <div id="map"></div>
    <div class="legend" id="legend">Mapa vazio</div>
  </main>
</div>

<script>
const ENDPOINT = "CusteioInvestimentoComercialIndustrialSemFiltros";
const PAGE_SIZE = 250; // tamanho conservador para evitar 500/timeouts
const MAX_EMPTY_OR_ERROR_RETRIES = 3;
let stopFlag = false;
let aggregate = new Map();
let totalRows = 0;
let map, layer;

const UFS = [
  ["AC","Acre"],["AL","Alagoas"],["AP","Amapá"],["AM","Amazonas"],["BA","Bahia"],["CE","Ceará"],
  ["DF","Distrito Federal"],["ES","Espírito Santo"],["GO","Goiás"],["MA","Maranhão"],["MT","Mato Grosso"],
  ["MS","Mato Grosso do Sul"],["MG","Minas Gerais"],["PA","Pará"],["PB","Paraíba"],["PR","Paraná"],
  ["PE","Pernambuco"],["PI","Piauí"],["RJ","Rio de Janeiro"],["RN","Rio Grande do Norte"],["RS","Rio Grande do Sul"],
  ["RO","Rondônia"],["RR","Roraima"],["SC","Santa Catarina"],["SP","São Paulo"],["SE","Sergipe"],["TO","Tocantins"]
];
const UF_CODE = {RO:11,AC:12,AM:13,RR:14,PA:15,AP:16,TO:17,MA:21,PI:22,CE:23,RN:24,PB:25,PE:26,AL:27,SE:28,BA:29,MG:31,ES:32,RJ:33,SP:35,PR:41,SC:42,RS:43,MS:50,MT:51,GO:52,DF:53};
const CODE_UF = Object.fromEntries(Object.entries(UF_CODE).map(([k,v]) => [String(v), k]));

init();
function init(){
  document.getElementById("uf").innerHTML = UFS.map(([u,n]) => `<option value="${u}" ${u==='MG'?'selected':''}>${u} · ${n}</option>`).join('');
  map = L.map('map').setView([-14.2,-51.9], 4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18, attribution:'© OpenStreetMap' }).addTo(map);
}

function yearsFromSelect(){
  const [a,b] = document.getElementById('periodo').value.split('-').map(Number);
  const years = [];
  for(let y=a;y<=b;y++) years.push(String(y));
  return years;
}
function log(msg){
  const el = document.getElementById('log');
  el.textContent += msg + "\n";
  el.scrollTop = el.scrollHeight;
}
function status(msg){ document.getElementById('status').textContent = msg; }
function setProgress(done,total){ document.getElementById('bar').style.width = Math.min(100, done/total*100) + '%'; }
function n(v){ return Number(v || 0); }
function fmtBR(v){ return n(v).toLocaleString('pt-BR'); }
function fmtMoney(v){ return n(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0}); }
function municipioKey(row){ return String(row.codMunicIbge || '').padStart(7,'0'); }

function buildUrl(params){
  const qs = new URLSearchParams({ endpoint: ENDPOINT, "$format":"json", ...params });
  return "/api/bcb?" + qs.toString();
}

async function fetchPage(params, attempt=1){
  const url = buildUrl(params);
  const controller = new AbortController();
  const timeout = setTimeout(()=>controller.abort(), 20000);
  try{
    const res = await fetch(url, {signal: controller.signal});
    clearTimeout(timeout);
    const text = await res.text();
    if(!res.ok) throw new Error(`HTTP ${res.status}: ${text.slice(0,300)}`);
    return JSON.parse(text).value || [];
  }catch(e){
    clearTimeout(timeout);
    if(attempt < MAX_EMPTY_OR_ERROR_RETRIES){
      log(`Falhou, tentando novamente (${attempt+1}/${MAX_EMPTY_OR_ERROR_RETRIES})... ${String(e).slice(0,120)}`);
      await sleep(1200 * attempt);
      return fetchPage(params, attempt+1);
    }
    throw e;
  }
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function carregarDados(){
  stopFlag = false;
  aggregate = new Map();
  totalRows = 0;
  document.getElementById('log').textContent = '';
  document.getElementById('topTable').textContent = 'Dados carregando...';
  updateStats();

  const years = yearsFromSelect();
  const select = "codMunicIbge,Municipio,nomeUF,cdEstado,AnoEmissao,MesEmissao,QtdCusteio,VlCusteio,QtdInvestimento,VlInvestimento,QtdComercializacao,VlComercializacao,QtdIndustrializacao,VlIndustrializacao";
  const totalYearSteps = years.length;
  let doneYears = 0;

  document.getElementById('btnLoad').disabled = true;
  status(`Carregando ${years[0]}–${years[years.length-1]}...`);

  try{
    for(const year of years){
      if(stopFlag) break;
      let skip = 0;
      let page = 1;
      log(`Ano ${year}`);

      while(true){
        if(stopFlag) break;
        status(`Ano ${year} · página ${page} · registros lidos ${fmtBR(totalRows)}`);
        const rows = await fetchPage({
          "$top": String(PAGE_SIZE),
          "$skip": String(skip),
          "$select": select,
          "$filter": `AnoEmissao eq ${year}`
        });

        totalRows += rows.length;
        for(const r of rows) addRow(r);
        if(page % 5 === 0) updateStats();
        log(`  página ${page}: ${rows.length} linhas · total ${fmtBR(totalRows)}`);

        if(rows.length < PAGE_SIZE) break;
        skip += PAGE_SIZE;
        page++;
        await sleep(150);
      }

      doneYears++;
      setProgress(doneYears,totalYearSteps);
      updateStats();
    }

    status(stopFlag ? `Parado. ${fmtBR(totalRows)} linhas lidas.` : `Finalizado. ${fmtBR(totalRows)} linhas lidas.`);
    log('Carga finalizada. Agora selecione uma UF e clique em desenhar.');
  }catch(e){
    status('Erro durante carga. Dados parciais preservados.');
    log('ERRO: ' + String(e));
  }finally{
    document.getElementById('btnLoad').disabled = false;
    updateStats();
  }
}

function addRow(r){
  const key = municipioKey(r);
  if(!key || key === '0000000') return;
  const old = aggregate.get(key) || {
    codMunicIbge:key,
    municipio:r.Municipio || '',
    uf:r.nomeUF || CODE_UF[String(r.cdEstado)] || '',
    qtdTotal:0, valorTotal:0,
    qtdCusteio:0, vlCusteio:0,
    qtdInvestimento:0, vlInvestimento:0,
    qtdComercializacao:0, vlComercializacao:0,
    qtdIndustrializacao:0, vlIndustrializacao:0
  };
  old.municipio = old.municipio || r.Municipio || '';
  old.uf = old.uf || r.nomeUF || CODE_UF[String(r.cdEstado)] || '';
  old.qtdCusteio += n(r.QtdCusteio);
  old.vlCusteio += n(r.VlCusteio);
  old.qtdInvestimento += n(r.QtdInvestimento);
  old.vlInvestimento += n(r.VlInvestimento);
  old.qtdComercializacao += n(r.QtdComercializacao);
  old.vlComercializacao += n(r.VlComercializacao);
  old.qtdIndustrializacao += n(r.QtdIndustrializacao);
  old.vlIndustrializacao += n(r.VlIndustrializacao);
  old.qtdTotal = old.qtdCusteio + old.qtdInvestimento + old.qtdComercializacao + old.qtdIndustrializacao;
  old.valorTotal = old.vlCusteio + old.vlInvestimento + old.vlComercializacao + old.vlIndustrializacao;
  aggregate.set(key, old);
}

function updateStats(){
  let val=0, qtd=0;
  for(const r of aggregate.values()){ val += r.valorTotal; qtd += r.qtdTotal; }
  document.getElementById('sMun').textContent = fmtBR(aggregate.size);
  document.getElementById('sReg').textContent = fmtBR(totalRows);
  document.getElementById('sVal').textContent = fmtMoney(val);
  document.getElementById('sQtd').textContent = fmtBR(qtd);
}

function parar(){ stopFlag = true; status('Parando ao fim da página atual...'); }

async function desenharUF(){
  const uf = document.getElementById('uf').value;
  const ufCode = UF_CODE[uf];
  const metric = document.getElementById('metric').value;
  status(`Carregando malha municipal ${uf}...`);

  const geoUrl = `https://servicodados.ibge.gov.br/api/v3/malhas/estados/${ufCode}?formato=application/vnd.geo+json&qualidade=minima&intrarregiao=municipio`;
  const geo = await fetch(geoUrl).then(r => {
    if(!r.ok) throw new Error('Erro ao carregar malha IBGE ' + r.status);
    return r.json();
  });

  const rowsUF = [...aggregate.values()].filter(r => ufFromIbge(r.codMunicIbge) === uf);
  const vals = rowsUF.map(r => r[metric]).filter(v => v > 0).sort((a,b)=>a-b);
  const breaks = makeBreaks(vals);

  if(layer) layer.remove();
  layer = L.geoJSON(geo, {
    style: f => {
      const code = featureCode(f);
      const r = aggregate.get(code);
      const v = r ? r[metric] : 0;
      return { color:'#fff', weight:.5, fillColor: colorFor(v, breaks), fillOpacity: v>0 ? .78 : .18 };
    },
    onEachFeature: (f,l) => {
      const code = featureCode(f);
      const r = aggregate.get(code);
      const name = featureName(f) || (r && r.municipio) || code;
      const v = r ? r[metric] : 0;
      l.bindPopup(`<b>${name}</b><br>IBGE: ${code}<br>${labelMetric(metric)}: <b>${metric.startsWith('vl') || metric==='valorTotal' ? fmtMoney(v) : fmtBR(v)}</b><br>Contratos: ${fmtBR(r?.qtdTotal || 0)}<br>Total: ${fmtMoney(r?.valorTotal || 0)}`);
    }
  }).addTo(map);
  map.fitBounds(layer.getBounds());
  renderLegend(breaks, metric);
  renderTop(rowsUF, metric);
  status(`Mapa ${uf} desenhado · ${fmtBR(rowsUF.length)} municípios com dados.`);
}

function ufFromIbge(code){ return CODE_UF[String(code).slice(0,2)] || ''; }
function featureCode(f){
  const p = f.properties || {};
  return String(p.codarea || p.cd_geocmu || p.CD_MUN || p.id || p.codigo || '').padStart(7,'0');
}
function featureName(f){
  const p = f.properties || {};
  return p.nome || p.name || p.NM_MUN || p.NM_MUNICIP || '';
}
function makeBreaks(vals){
  if(!vals.length) return [0,0,0,0,0];
  const q = p => vals[Math.min(vals.length-1, Math.floor((vals.length-1)*p))];
  return [q(.2), q(.4), q(.6), q(.8), vals[vals.length-1]];
}
function colorFor(v,b){
  if(!v) return '#ddd';
  if(v <= b[0]) return '#d8ead5';
  if(v <= b[1]) return '#acd2a6';
  if(v <= b[2]) return '#76b37a';
  if(v <= b[3]) return '#3f8f5d';
  return '#1f5b3a';
}
function labelMetric(m){
  return ({valorTotal:'Valor total',qtdTotal:'Contratos',vlCusteio:'Valor custeio',vlInvestimento:'Valor investimento',vlComercializacao:'Valor comercialização',vlIndustrializacao:'Valor industrialização'})[m] || m;
}
function renderLegend(b, metric){
  const money = metric.startsWith('vl') || metric === 'valorTotal';
  const f = v => money ? fmtMoney(v) : fmtBR(v);
  document.getElementById('legend').innerHTML = `<b>${labelMetric(metric)}</b><br>
    <span class="sw" style="background:#d8ead5"></span>até ${f(b[0])}<br>
    <span class="sw" style="background:#acd2a6"></span>até ${f(b[1])}<br>
    <span class="sw" style="background:#76b37a"></span>até ${f(b[2])}<br>
    <span class="sw" style="background:#3f8f5d"></span>até ${f(b[3])}<br>
    <span class="sw" style="background:#1f5b3a"></span>acima`;
}
function renderTop(rows, metric){
  const money = metric.startsWith('vl') || metric === 'valorTotal';
  const f = v => money ? fmtMoney(v) : fmtBR(v);
  const top = rows.sort((a,b)=>b[metric]-a[metric]).slice(0,12);
  if(!top.length){ document.getElementById('topTable').textContent = 'Sem dados para esta UF.'; return; }
  document.getElementById('topTable').innerHTML = `<table><thead><tr><th>Município</th><th>${labelMetric(metric)}</th></tr></thead><tbody>`+
    top.map(r => `<tr><td>${esc(r.municipio)}</td><td>${f(r[metric])}</td></tr>`).join('') + `</tbody></table>`;
}
function esc(v){ return String(v ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }

function baixarCSV(){
  if(!aggregate.size){ alert('Carregue os dados primeiro.'); return; }
  const cols = ['codMunicIbge','municipio','uf','qtdTotal','valorTotal','qtdCusteio','vlCusteio','qtdInvestimento','vlInvestimento','qtdComercializacao','vlComercializacao','qtdIndustrializacao','vlIndustrializacao'];
  const lines = [cols.join(';')];
  for(const r of aggregate.values()) lines.push(cols.map(c => `"${String(r[c] ?? '').replace(/"/g,'""')}"`).join(';'));
  const blob = new Blob([lines.join('\n')], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'credito_rural_municipios_2015_2025_agregado.csv';
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
